services:
  - type: web
    name: mpd-bot
    env: node
    plan: free
    repo: https://github.com/yourusername/MPDWork # Update with your repo URL after pushing
    branch: main
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false  # Set this manually in Render dashboard
    autoDeploy: true
